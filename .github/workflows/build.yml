# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Build with java

on:
  push:
    branches: [ "develop","master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-00:
    name: init job
    runs-on: ubuntu-22.04
    steps:
      - id: init_job
        run: echo hello world
  build-01:
    name: My first job
    needs: [build-03]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: ["x86","x64","arm","amd"]
        browns: ["Edge","chrome","firefox"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: echo the matirx
      run: |
        echo ${{ matrix.os }}
        echo ${{ matrix.browns }}
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        name: Demo-Artifact
        path: /target/*.?ar
    # The desired behavior if no files are found using the provided path.
        warn: Output a warning but do not fail the action
        error: Fail the action with an error message
        ignore: Do not output any warnings or errors, the action does not fail
  build-02:
    name: My-second-job
    runs-on: ubuntu-latest
    needs: [build-01]
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v6.0.0
      with:
        name: Demo-Artifact
        path: /target/*.?ar
    # The desired behavior if no files are found using the provided path.
        warn: Output a warning but do not fail the action
        error: Fail the action with an error message
        ignore: Do not output any warnings or errors, the action does not fail
  build-03:
    name: My-third-job
    runs-on: ubuntu-latest
    needs: [build-00]
    env:
      JOB_NAME: My-third-job
    outputs:
      job_name: 第三个任务
    steps:
    - uses: actions/checkout@v4
    - id: set_job_name_to_output
      name: initilize job name output
      run: |
        echo "job_name=第三个任务" >> GITHUB_OUTPUT
    - name: show me the job name
      run: |
        echo ${{ github.job }}
        echo $JOB_NAME
        echo ${{ steps.set_job_name_to_output.outputs.job_name }}
